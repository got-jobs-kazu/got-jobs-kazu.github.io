<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kazuma's Portfolio - UI Style</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    /* 背景を暗い洞窟や夜のような色に設定 */
    body {
      font-family: 'DotGothic16', sans-serif;
      background-color: #2b2b2b; 
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* 画面いっぱいの高さ */
      margin: 0;
    }

    /* インベントリや作業台のUI風のウィンドウ */
    .inventory-box {
      background-color: #c6c6c6; /* マイクラUI特有のグレー */
      border: 4px solid #000000;
      padding: 40px;
      color: #333333; /* ウィンドウ内の文字は黒 */
      
      /* ウィンドウ枠の立体感を出す影 */
      box-shadow: 
        inset 6px 6px 0px rgba(255, 255, 255, 0.8), 
        inset -6px -6px 0px rgba(85, 85, 85, 0.8);
      
      text-align: center;
      width: 80%;
      max-width: 500px;
    }

    h1 {
      font-size: 2rem;
      margin-top: 0;
      border-bottom: 4px solid #555555;
      padding-bottom: 15px;
      text-shadow: 1px 1px 0 #ffffff;
    }

    /* アイテムスロット風のボタン */
    .slot-btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 20px 0;
      font-family: 'DotGothic16', sans-serif;
      font-size: 1.3rem;
      color: #ffffff;
      background-color: #8b8b8b;
      border: 3px solid #000000;
      
      box-shadow: 
        inset 4px 4px 0px rgba(255, 255, 255, 0.6), 
        inset -4px -4px 0px rgba(0, 0, 0, 0.5);
      cursor: pointer;
    }

    .slot-btn:hover {
      background-color: #9e9e9e;
    }

    .slot-btn:active {
      box-shadow: 
        inset 4px 4px 0px rgba(0, 0, 0, 0.5), 
        inset -4px -4px 0px rgba(255, 255, 255, 0.6);
      transform: translateY(2px);
    }
  </style>
</head>
<body>

  <div class="inventory-box">
    <h1>サーバー管理メニュー</h1>
    <p>こちらはインベントリ（UI）風のデザインです！</p>
    
    <button class="slot-btn">冒険の記録（学習履歴）</button>
    <button class="slot-btn">通信設備（コンタクト）</button>
  </div>

</body>
</html>
